  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    .perspective-1000 {
      perspective: 1000px;
    }
    .rotate-y-12 {
      transform: rotateY(12deg);
    }
    
    /* Smooth transition for category filtering */
    .project-card-enter {
      opacity: 0;
      transform: scale(0.9);
    }
    .project-card-enter-active {
      opacity: 1;
      transform: scale(1);
      transition: opacity 300ms, transform 300ms;
    }
  </style>
